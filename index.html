/* ================================================================

   Dive by day, serve by night. An original fan prototype inspired
   by Dave the Diver. All art procedural canvas. No assets, no libs.
   ================================================================ */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,DT=0;
let RB=null,rctx=null,RB2,r2ctx;
function sizeRB(){RB=document.createElement('canvas');RB.width=Math.max(4,W>>2);RB.height=Math.max(4,H>>2);rctx=RB.getContext('2d');
 RB2=document.createElement('canvas');RB2.width=RB.width;RB2.height=RB.height;r2ctx=RB2.getContext('2d');}
const VW=1440,VH=820;
let SCALE=1,OX=0,OY=0;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);
 W=VW;H=VH;
 SCALE=Math.min(window.innerWidth/VW,window.innerHeight/VH)||1;
 cv.width=Math.max(2,Math.round(VW*SCALE*DPR));
 cv.height=Math.max(2,Math.round(VH*SCALE*DPR));
 cv.style.width=Math.round(VW*SCALE)+'px';
 cv.style.height=Math.round(VH*SCALE)+'px';
 OX=Math.round((window.innerWidth-VW*SCALE)/2);
 OY=Math.round((window.innerHeight-VH*SCALE)/2);
 cv.style.position='fixed';cv.style.left=OX+'px';cv.style.top=OY+'px';
 document.body.style.background='#04070f';document.body.style.margin='0';
 sizeRB();}

/* ---------- utils ---------- */
const TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a=1,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));
const dist=(a,b,c,d)=>Math.hypot(c-a,d-b);
const pick=a=>a[irand(0,a.length-1)];
const easeOut=t=>1-Math.pow(1-t,3);
function rr(x,y,w,h,r){const q=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+q,y);ctx.arcTo(x+w,y,x+w,y+h,q);ctx.arcTo(x+w,y+h,x,y+h,q);ctx.arcTo(x,y+h,x,y,q);ctx.arcTo(x,y,x+w,y,q);ctx.closePath();}
function shade(c,amt){let r,g,b;
 if(c[0]==='#'){const n=parseInt(c.slice(1),16);r=n>>16;g=n>>8&255;b=n&255;}
 else{const m=c.match(/\d+/g);r=+m[0];g=+m[1];b=+m[2];}
 r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
 return '#'+((r<<16|g<<8|b).toString(16).padStart(6,'0'));}
const FB='"Baloo 2","Trebuchet MS",sans-serif';
const FN='"Nunito","Trebuchet MS",sans-serif';

/* ---------- audio ---------- */
const AUDIO={on:true,ctx:null,
 init(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){this.on=false;}}
  if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},
 tone(f,d,type='sine',v=0.14,slide=0){if(!this.on||!this.ctx)return;const t=this.ctx.currentTime;
  const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;
  o.frequency.setValueAtTime(f,t);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(g).connect(this.ctx.destination);o.start(t);o.stop(t+d+0.03);},
 shoot(){this.tone(640,0.12,'square',0.07,-460);},
 hit(){this.tone(210,0.1,'square',0.11,-90);},
 caught(){this.tone(523,0.09,'sine',0.13);setTimeout(()=>this.tone(784,0.13,'sine',0.13),70);},
 bubble(){this.tone(rand(680,980),0.06,'sine',0.045,320);},
 coin(){this.tone(880,0.07,'square',0.07);setTimeout(()=>this.tone(1318,0.12,'square',0.07),60);},
 serve(){this.tone(660,0.08,'triangle',0.11);setTimeout(()=>this.tone(990,0.1,'triangle',0.09),70);},
 sad(){this.tone(300,0.2,'sawtooth',0.06,-130);},
 warn(){this.tone(392,0.12,'sine',0.09);},
 ui(){this.tone(520,0.05,'sine',0.06,220);}
};

/* ---------- input ---------- */
const keys={};
const mouse={x:-99,y:-99,down:false,clicked:false,rdown:false};
window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;
 if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
cv.addEventListener('mousemove',e=>{mouse.x=(e.clientX-OX)/SCALE;mouse.y=(e.clientY-OY)/SCALE;});
cv.addEventListener('mousedown',e=>{AUDIO.init();
 if(e.button===2){mouse.rdown=true;return;}
 mouse.down=true;mouse.clicked=true;});
window.addEventListener('mouseup',e=>{if(e.button===2)mouse.rdown=false;else mouse.down=false;});
cv.addEventListener('contextmenu',e=>e.preventDefault());
let shopScroll=0,shopMax=0;
window.addEventListener('wheel',e=>{if(G.state==='shop')shopScroll=clamp(shopScroll+e.deltaY,0,shopMax);
 if(G.state==='sled')sled.cam.z=clamp(sled.cam.z*(e.deltaY>0?0.9:1.1),0.3,3);},{passive:true});

/* ---------- immediate-mode UI ---------- */
let hoverUI=false;
function panel(x,y,w,h,a=0.66){rr(x,y,w,h,16);ctx.fillStyle=`rgba(7,15,35,${a})`;ctx.fill();
 ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,246,232,0.16)';ctx.stroke();}
function button(x,y,w,h,label,opt={}){const {size=21,accent=false,disabled=false}=opt;
 const inside=mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
 if(inside&&!disabled)hoverUI=true;
 const lift=inside&&!disabled?-2:0;
 ctx.save();
 rr(x,y+4,w,h,14);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
 rr(x,y+lift,w,h,14);
 if(disabled)ctx.fillStyle='rgba(58,68,92,0.55)';
 else if(accent){const ag=ctx.createLinearGradient(x,y,x,y+h);
  ag.addColorStop(0,OC().rays[3]);ag.addColorStop(1,shade(OC().rays[3],-34));
  ctx.fillStyle=ag;}
 else ctx.fillStyle='rgba(12,26,54,0.92)';
 ctx.fill();
 ctx.lineWidth=2;
 ctx.strokeStyle=disabled?'rgba(255,255,255,0.1)':(accent?hexA(OC().sun[0],0.9):hexA(OC().rays[2],0.4));
 ctx.stroke();
 ctx.fillStyle=disabled?'rgba(255,246,232,0.35)':'#fff6e8';
 ctx.font=`800 ${size}px ${FB}`;ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText(label,x+w/2,y+h/2+lift+1);
 ctx.restore();
 const hit=inside&&mouse.clicked&&!disabled;
 if(hit){mouse.clicked=false;AUDIO.ui();}
 return hit;}
function drawCoin(x,y,r){ctx.save();ctx.fillStyle='#ffcf5c';ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();
 ctx.strokeStyle='#c98f1e';ctx.lineWidth=r*0.22;ctx.beginPath();ctx.arc(x,y,r*0.68,0,TAU);ctx.stroke();
 ctx.fillStyle='#8a5e0d';ctx.font=`800 ${r*1.15}px ${FB}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',x,y+1);ctx.restore();}

/* ---------- persistent storage (artifact -> localStorage -> memory) ---------- */
const Store=(()=>{let mode='mem';const mem={};
 try{if(window.storage&&window.storage.get)mode='artifact';}catch(e){}
 if(mode==='mem'){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');mode='local';}catch(e){}}
 return{mode:()=>mode,
  async get(k){try{if(mode==='artifact'){const r=await window.storage.get(k);return r?r.value:null;}
   if(mode==='local')return localStorage.getItem(k);}catch(e){}return mem[k]!==undefined?mem[k]:null;},
  async set(k,v){try{if(mode==='artifact'){await window.storage.set(k,v);return;}
   if(mode==='local'){localStorage.setItem(k,v);return;}}catch(e){}mem[k]=v;},
  async del(k){try{if(mode==='artifact'){await window.storage.delete(k);return;}
   if(mode==='local'){localStorage.removeItem(k);return;}}catch(e){}delete mem[k];}};})();

 if(g2.ocean&&OCIDX[g2.ocean]!==undefined)G.ocean=g2.ocean;}}catch(e){}})();

function saveActive(){if(G.slot<0)return;

  weps:[...G.weps],wep:G.wep,tips:[...G.tips],tip:G.tip,gogs:[...G.gogs],gog:G.gog,fins:[...G.fins],fin:G.fin,auras:[...G.auras],aura:G.aura,decors:[...G.decors],decor:G.decor,seenIntro:G.seenIntro,seenNight:G.seenNight,
  dyes:[...G.dyes],dye:G.dye,wigs:[...G.wigs],wig:G.wig,ts:Date.now()};
 SAVES[G.slot]=d;Store.set(slotKey(G.slot),JSON.stringify(d));}
function loadSlot(i){const d=SAVES[i];if(!d)return;G.slot=i;
 G.day=d.day||1;G.money=d.money||0;G.goalHit=!!d.goalHit;
 G.up={o2:0,bag:0,spear:0,speed:0,reach:0,hull:0,...(d.up||{})};
 G.vend={owned:0,snacks:0,day0:0,lastOfferDay:0,...(d.vend||{})};
 G.skins=d.skins&&d.skins.length?[...d.skins]:['default'];
 G.skin=d.skin&&SKINS[d.skin]?d.skin:'default';
 G.ing={rice:0,nori:0,wasabi:0,matcha:0,barley:0,...(d.ing||{})};
 G.tanks=d.tanks||0;
 G.weps=d.weps&&d.weps.length?[...d.weps]:['spear'];
 G.wep=d.wep&&G.weps.includes(d.wep)?d.wep:'spear';
 G.tips=d.tips&&d.tips.length?[...d.tips]:['steel'];G.tip=d.tip||'steel';
 G.gogs=d.gogs&&d.gogs.length?[...d.gogs]:['sky'];G.gog=d.gog||'sky';
 G.dyes=d.dyes&&d.dyes.length?[...d.dyes]:['brown'];G.dye=d.dye||'brown';
 G.wigs=d.wigs&&d.wigs.length?[...d.wigs]:['crop'];G.wig=d.wig||'crop';
 G.fins=d.fins&&d.fins.length?[...d.fins]:['suit'];G.fin=d.fin||'suit';
 G.auras=d.auras&&d.auras.length?[...d.auras]:['none'];G.aura=d.aura||'none';
 G.decors=d.decors&&d.decors.length?[...d.decors]:['classic'];G.decor=d.decor||'classic';
 G.seenIntro=!!d.seenIntro;G.seenNight=!!d.seenNight;}
function resetLive(){G.slot=-1;G.day=1;G.money=200;G.goalHit=false;
 G.up={o2:0,bag:0,spear:0,speed:0,reach:0,hull:0};G.tanks=0;G.vend={owned:0,snacks:0,day0:0,lastOfferDay:0};
 G.skins=['default'];G.skin='default';
 G.weps=['spear'];G.wep='spear';G.tips=['steel'];G.tip='steel';
 G.gogs=['sky'];G.gog='sky';G.dyes=['brown'];G.dye='brown';G.wigs=['crop'];G.wig='crop';
 G.fins=['suit'];G.fin='suit';G.auras=['none'];G.aura='none';G.decors=['classic'];G.decor='classic';G.seenIntro=false;G.seenNight=false;

function deleteSlot(i){SAVES[i]=null;Store.del(slotKey(i));if(G.slot===i)resetLive();}

   ctx.beginPath();ctx.moveTo(bx-3,by2+2);
   ctx.lineTo(bx+Math.cos(a)*7,by2+Math.sin(a)*7);
   ctx.lineTo(bx+3,by2+2);ctx.closePath();ctx.fill();}break;
  case 'bowl':ctx.beginPath();ctx.arc(0,-r*0.15,r*1.12,Math.PI,0);ctx.fill();
   ctx.fillRect(-r*1.1,-r*0.2,r*2.2,r*0.35);break;
  case 'long':ctx.beginPath();ctx.arc(0,-r*0.2,r*1.1,Math.PI,0);ctx.fill();
   rr(-r*1.15,-r*0.25,r*0.5,r*2.1,3);ctx.fill();
   rr(r*0.65,-r*0.25,r*0.5,r*2.1,3);ctx.fill();break;
  case 'bun':ctx.beginPath();ctx.arc(0,-r*0.25,r*1.05,Math.PI,0);ctx.fill();
   ctx.beginPath();ctx.arc(-r*0.9,-r*0.9,r*0.5,0,TAU);ctx.fill();break;
  case 'afro':ctx.beginPath();ctx.arc(0,-r*0.5,r*1.5,0,TAU);ctx.fill();break;
  case 'mohawk':for(let i=0;i<4;i++){const bx=-r*0.6+i*r*0.42;
   ctx.beginPath();ctx.moveTo(bx-2.4,-r*0.7);ctx.lineTo(bx,-r*1.9);
   ctx.lineTo(bx+2.4,-r*0.7);ctx.closePath();ctx.fill();}break;
  case 'buzz':{const fs=ctx.fillStyle;ctx.strokeStyle=fs;ctx.lineWidth=2.4;
   ctx.beginPath();ctx.arc(-1,-r*0.4,r,Math.PI*1.08,Math.PI*1.92);ctx.stroke();}break;
  case 'pony':{ctx.beginPath();ctx.arc(0,-r*0.25,r*1.05,Math.PI,0);ctx.fill();
   const fs=ctx.fillStyle;ctx.strokeStyle=fs;ctx.lineWidth=r*0.5;ctx.lineCap='round';
   ctx.beginPath();ctx.moveTo(-r*0.85,-r*0.4);
   ctx.quadraticCurveTo(-r*1.7,r*0.3,-r*1.35,r*1.5);ctx.stroke();}break;
  case 'pig':{ctx.beginPath();ctx.arc(0,-r*0.25,r*1.05,Math.PI,0);ctx.fill();
   for(const sd of[-1,1]){ctx.beginPath();
    ctx.ellipse(sd*r*1.12,r*0.25,r*0.36,r*0.72,sd*0.25,0,TAU);ctx.fill();}}break;
  case 'curls':{for(let i=0;i<6;i++){const a=Math.PI*(1.04+i*0.185);
   ctx.beginPath();ctx.arc(Math.cos(a)*r*0.9,Math.sin(a)*r*0.9-r*0.1,r*0.42,0,TAU);ctx.fill();}}break;
  case 'side':{ctx.beginPath();ctx.arc(-1,-r*0.3,r*1.06,Math.PI*0.98,Math.PI*1.98);ctx.fill();
   ctx.beginPath();ctx.moveTo(-r*1.02,-r*0.15);
   ctx.quadraticCurveTo(-r*0.2,-r*1.3,r*0.95,-r*0.45);
   ctx.quadraticCurveTo(r*0.2,-r*0.55,-r*0.55,r*0.15);ctx.closePath();ctx.fill();}break;}

  const inside=mouse.x>=x&&mouse.x<=x+cardW&&mouse.y>=y&&mouse.y<=y+cardH;
  if(inside)hoverUI=true;
  rr(x,y,cardW,cardH,16);
  ctx.fillStyle=inside?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.05)';ctx.fill();
  ctx.lineWidth=sel?3:1.5;ctx.strokeStyle=sel?'#ffd23f':'rgba(255,246,232,0.16)';ctx.stroke();
  rr(x+14,y+14,cardW-28,54,10);
  const wg2=ctx.createLinearGradient(0,y+14,0,y+68);
  wg2.addColorStop(0,o.sky[1][1]);
  for(const st2 of o.water)wg2.addColorStop(0.18+st2[0]*0.82,st2[1]);
  ctx.fillStyle=wg2;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.2;ctx.stroke();
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.font=`800 17px ${FB}`;ctx.fillStyle='#fff6e8';ctx.fillText(o.name,x+14,y+86);
  ctx.font=`700 13px ${FN}`;
  if(sel){ctx.fillStyle='#ffd23f';ctx.fillText('SAILING HERE',x+14,y+112);}
  else if(owned){ctx.fillStyle='#9be8ff';ctx.fillText('Owned \u2014 click to sail',x+14,y+112);}
  else{const c=oceanCost();
   ctx.fillStyle=G.money>=c?'#7cf2a8':'#ff9d9d';
   ctx.fillText(c===0?'FREE \u2014 first pick!':'$'+c,x+14,y+112);}
  if(inside&&mouse.clicked){mouse.clicked=false;
   if(owned){if(!sel){G.ocean=o.id;AUDIO.ui();saveActive();saveGlobal();}}
   else{const c=oceanCost();
    if(G.money>=c){G.money-=c;G.oceans.push(o.id);G.ocean=o.id;AUDIO.coin();saveActive();saveGlobal();}
    else{AUDIO.sad();setMsg('Not enough gold \u2014 charts cost $1000',2.2);}}}});
 drawMsg();muteButton();}

/* ================= BOAT DECK ================= */
let boatNote=null,boatLine=-1;
const CAPT=[
 ['Sharks patrol the deep water.','Better fins help you slip away.'],
 ['Escape pods beam you back here \u2014','handy when the tank runs low.'],
 ['The shack sells spare O\u2082 tanks.','Press Q down there to crack one.'],
 ['New oceans are on the title charts.','Your first new chart is free!'],
 ['A perfect beer is about 80% pour','and a cap of foam. Spill happy.'],
 ['Whatever sits on the pass at close','gets sold \u2014 nothing goes to waste.']];
function startBoat(note){boatNote=note||null;boatLine=-1;G.state='boat';}
function drawCaptain(x,y,t){ctx.save();ctx.translate(x,y);
 const bob=Math.sin(t*1.6)*2;ctx.translate(0,bob);
 ctx.fillStyle='#1d3c5e';rr(-26,-38,52,74,16);ctx.fill();
 ctx.fillStyle='#ffd23f';
 for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(0,-22+i*16,3,0,TAU);ctx.fill();}
 ctx.strokeStyle='#1d3c5e';ctx.lineWidth=11;ctx.lineCap='round';
 ctx.beginPath();ctx.moveTo(-22,-18);ctx.quadraticCurveTo(-34,2,-26,18);ctx.stroke();
 ctx.beginPath();ctx.moveTo(22,-18);ctx.quadraticCurveTo(34,2,26,18);ctx.stroke();
 ctx.fillStyle='#f2b98c';ctx.beginPath();ctx.arc(0,-60,22,0,TAU);ctx.fill();
 ctx.fillStyle='#e8eef4';ctx.beginPath();ctx.arc(0,-52,16,Math.PI*0.1,Math.PI*0.9);ctx.closePath();ctx.fill();
 ctx.fillStyle='#14253c';ctx.beginPath();ctx.arc(0,-72,20,Math.PI,0);ctx.closePath();ctx.fill();
 ctx.fillStyle='#0d1a2c';rr(-24,-74,48,8,4);ctx.fill();
 ctx.fillStyle='#ffd23f';rr(-8,-73,16,4,2);ctx.fill();
 ctx.fillStyle='#22150f';ctx.beginPath();ctx.arc(-7,-62,2.8,0,TAU);ctx.fill();
 ctx.beginPath();ctx.arc(7,-62,2.8,0,TAU);ctx.fill();
 ctx.restore();}
function drawFinnDeckLocal(t){
 const sk=curSkin();
 const bob=Math.sin(t*1.6)*1.5;
 ctx.save();
 ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(0,22,22,5,0,0,TAU);ctx.fill();
 ctx.translate(0,bob);
 const ff=FINS.find(f2=>f2.id===G.fin)||FINS[0];
 const finCol=ff.id==='suit'?sk.fin:(ff.g?ff.g[0]:ff.c);
 ctx.fillStyle=finCol;
 ctx.beginPath();ctx.ellipse(-6,18,14,4.6,0,0,TAU);ctx.fill();
 ctx.beginPath();ctx.ellipse(7,18,12,4.2,0,0,TAU);ctx.fill();
 ctx.strokeStyle=sk.dark;ctx.lineWidth=8;ctx.lineCap='round';
 ctx.beginPath();ctx.moveTo(-4,14);ctx.lineTo(-4,-10);ctx.stroke();
 ctx.beginPath();ctx.moveTo(5,14);ctx.lineTo(5,-10);ctx.stroke();
 ctx.fillStyle='#ffd23f';rr(9,-42,10,24,5);ctx.fill();
 ctx.fillStyle='rgba(255,255,255,0.35)';rr(11,-39,3.6,18,1.8);ctx.fill();
 const bg=ctx.createLinearGradient(0,-46,0,-6);
 if(sk.grad){const n=sk.grad.length;
  for(let i=0;i<n;i++)bg.addColorStop(i/(n-1),sk.grad[i]);}
 else{bg.addColorStop(0,sk.a);bg.addColorStop(1,sk.b);}
 ctx.fillStyle=bg;ctx.beginPath();ctx.ellipse(0,-25,14,20,0,0,TAU);ctx.fill();
 ctx.strokeStyle='rgba(180,230,255,0.3)';ctx.lineWidth=2;
 ctx.beginPath();ctx.ellipse(0,-25,14,20,0,Math.PI*1.15,Math.PI*1.7);ctx.stroke();
 ctx.strokeStyle=sk.dark;ctx.lineWidth=6.4;
 ctx.beginPath();ctx.moveTo(-10,-34);ctx.quadraticCurveTo(-15,-22,-12,-11);ctx.stroke();
 ctx.beginPath();ctx.moveTo(10,-34);
 ctx.quadraticCurveTo(18,-32,20,-42+Math.sin(t*2.2)*2.5);ctx.stroke();
 ctx.fillStyle='#f2b98c';
 ctx.beginPath();ctx.arc(21,-44+Math.sin(t*2.2)*2.5,3.8,0,TAU);ctx.fill();
 ctx.fillStyle=hairFill();ctx.beginPath();ctx.arc(-3,-58,9.4,0,TAU);ctx.fill();
 ctx.fillStyle='#f2b98c';ctx.beginPath();ctx.arc(1.6,-56,8.8,0,TAU);ctx.fill();
 ctx.fillStyle='#2b3240';rr(-6.4,-66,16,5.4,2.7);ctx.fill();
 const gogc=(GOGS.find(g2=>g2.id===G.gog)||GOGS[0]).c;
 ctx.fillStyle=gogc;rr(-4.6,-65,5.4,3.8,1.8);ctx.fill();rr(2.6,-65,5.4,3.8,1.8);ctx.fill();
 ctx.fillStyle='#14202e';ctx.beginPath();ctx.arc(5,-57,1.3,0,TAU);ctx.fill();
 ctx.strokeStyle='rgba(20,32,46,0.65)';ctx.lineWidth=1.5;
 ctx.beginPath();ctx.arc(2.4,-53,3.2,0.3,Math.PI-0.5);ctx.stroke();
 ctx.restore();}
function drawBoatScene(t){
 const sg=ctx.createLinearGradient(0,0,0,H*0.62);
 for(const st2 of OC().sky)sg.addColorStop(st2[0],st2[1]);
 ctx.fillStyle=sg;ctx.fillRect(0,0,W,H*0.62);
 ctx.fillStyle='rgba(255,246,214,0.5)';ctx.beginPath();ctx.arc(W*0.72,H*0.2,54,0,TAU);ctx.fill();
 ctx.fillStyle='#fff3cd';ctx.beginPath();ctx.arc(W*0.72,H*0.2,36,0,TAU);ctx.fill();
 const wg2=ctx.createLinearGradient(0,H*0.55,0,H);
 for(const st2 of OC().water)wg2.addColorStop(st2[0],st2[1]);
 ctx.fillStyle=wg2;ctx.fillRect(0,H*0.55,W,H*0.45);
 ctx.strokeStyle='rgba(255,255,255,0.75)';ctx.lineWidth=3;ctx.lineCap='round';
 ctx.beginPath();
 for(let x=0;x<=W;x+=14){const y=H*0.55+waveOff(x*2,t)*0.4;x?ctx.lineTo(x,y):ctx.moveTo(x,y);}
 ctx.stroke();
 const dy=H*0.6;
 ctx.fillStyle='#8a2f22';ctx.fillRect(0,dy+70,W,H-dy-70);
 ctx.fillStyle='#b3452f';ctx.fillRect(0,dy+34,W,40);
 ctx.fillStyle='#ffe9c9';ctx.fillRect(0,dy+26,W,10);
 ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=2;
 for(let x=30;x<W;x+=90){ctx.beginPath();ctx.moveTo(x,dy+74);ctx.lineTo(x,H);ctx.stroke();}
 ctx.strokeStyle='#5a3a28';ctx.lineWidth=5;
 ctx.beginPath();ctx.moveTo(0,dy-24);ctx.lineTo(W,dy-24);ctx.stroke();
 for(let x=24;x<W;x+=64){ctx.beginPath();ctx.moveTo(x,dy-24);ctx.lineTo(x,dy+30);ctx.stroke();}
 ctx.fillStyle='#2e6f8e';rr(W*0.66,dy-96,150,122,10);ctx.fill();
 ctx.fillStyle='#bfe8f2';rr(W*0.66+16,dy-80,42,30,5);ctx.fill();
 ctx.strokeStyle='#5a3a28';ctx.lineWidth=7;
 ctx.beginPath();ctx.moveTo(W*0.2,dy+30);ctx.lineTo(W*0.2,dy-190);ctx.stroke();
 ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.moveTo(W*0.2,dy-190);
 ctx.quadraticCurveTo(W*0.2+64,dy-176+Math.sin(t*3)*5,W*0.2,dy-152);ctx.closePath();ctx.fill();
 drawCaptain(W*0.42,dy+34,t);
 ctx.save();ctx.translate(W*0.56,dy+8);ctx.scale(1.5,1.5);
 drawFinnDeckLocal(t);ctx.restore();
 monoPass();
 if(boatNote){ctx.font=`700 16px ${FN}`;
  const w=ctx.measureText(boatNote).width+44;
  rr(W/2-w/2,20,w,38,19);ctx.fillStyle='rgba(7,15,35,0.75)';ctx.fill();
  ctx.strokeStyle='rgba(255,246,232,0.2)';ctx.lineWidth=1.4;ctx.stroke();
  ctx.fillStyle='#ffe9c4';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(boatNote,W/2,40);}
 if(boatLine>=0){const lines=CAPT[boatLine];
  ctx.font=`700 15px ${FN}`;
  const bw2=Math.max(ctx.measureText(lines[0]).width,ctx.measureText(lines[1]).width)+36;
  const bx=W*0.42,by=dy-176;
  rr(bx-bw2/2,by-34,bw2,68,14);ctx.fillStyle='#fffdf7';ctx.fill();
  ctx.strokeStyle='rgba(30,40,60,0.18)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fffdf7';ctx.beginPath();
  ctx.moveTo(bx-9,by+34);ctx.lineTo(bx+9,by+34);ctx.lineTo(bx,by+50);ctx.closePath();ctx.fill();
  ctx.fillStyle='#2a3448';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(lines[0],bx,by-10);ctx.fillText(lines[1],bx,by+12);}
 ctx.font=`800 22px ${FB}`;ctx.fillStyle='#fff6e8';
 ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText('On deck',W/2,dy-52);
 if(button(W/2-262,H-96,250,52,'Talk to Captain Koji',{size:17}))
  boatLine=(boatLine+1)%CAPT.length;
 if(button(W/2+12,H-96,250,52,"To Finn's sushi bar \u25b6",{accent:true,size:17}))
  fadeTo(()=>startNight(boatNote||undefined),'dark');
 homeButton();
 muteButton();}

/* ================= DROWN CHOICE ================= */
function drawDrown(){
 ctx.fillStyle='rgba(5,8,20,0.7)';ctx.fillRect(0,0,W,H);
 const n=G.bag.length,cw=190,chh=58;
 const per=Math.min(4,Math.max(2,Math.floor((W-80)/210)));
 const rows=Math.ceil(n/per);
 const pw=Math.min(880,Math.max(520,per*(cw+12)-12+80));
 const ph=94+rows*(chh+10)+16+52+24;
 const px=W/2-pw/2,py=Math.max(12,(H-ph)/2);
 panel(px,py,pw,ph,0.94);
 ctx.font=`800 28px ${FB}`;ctx.fillStyle='#ff9d9d';
 ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText('You blacked out!',W/2,py+40);
 ctx.font=`700 15px ${FN}`;ctx.fillStyle='rgba(255,246,232,0.75)';
 ctx.fillText('The rescue crew lets you keep two fish \u2014 choose:',W/2,py+70);
 const gx0=W/2-(per*(cw+12)-12)/2;
 G.bag.forEach((id,i)=>{const col=i%per,row=Math.floor(i/per);
  const x=gx0+col*(cw+12),y=py+94+row*(chh+10);
  const sel=G.drownSel.includes(i);
  const inside=mouse.x>=x&&mouse.x<=x+cw&&mouse.y>=y&&mouse.y<=y+chh;
  if(inside)hoverUI=true;
  rr(x,y,cw,chh,12);
  ctx.fillStyle=sel?'rgba(124,242,168,0.18)':(inside?'rgba(255,255,255,0.1)':'rgba(255,255,255,0.05)');ctx.fill();
  ctx.lineWidth=sel?2.5:1.4;ctx.strokeStyle=sel?'#7cf2a8':'rgba(255,246,232,0.16)';ctx.stroke();
  const T=FISH[FIDX[id]];
  drawMiniFish(x+26,y+chh/2,T,1.5);
  ctx.textAlign='left';ctx.font=`800 14px ${FB}`;ctx.fillStyle='#fff6e8';
  ctx.fillText(T.n,x+48,y+22);
  ctx.font=`700 12px ${FN}`;ctx.fillStyle='#ffd75c';ctx.fillText('$'+T.v*2+' dish',x+48,y+40);
  if(inside&&mouse.clicked){mouse.clicked=false;AUDIO.ui();
   if(sel)G.drownSel=G.drownSel.filter(k=>k!==i);
   else if(G.drownSel.length<2)G.drownSel.push(i);}});
 if(button(W/2-150,py+ph-76,300,52,'Keep '+G.drownSel.length+' \u2014 back to the boat',{accent:true,size:17})){
  const kept=G.drownSel.map(i=>G.bag[i]);
  G.bag=kept;G.state='dive';
  fadeTo(()=>startBoat('Rescued! '+(kept.length?'You held onto '+kept.length+' fish.':'The cooler went down with you\u2026')),'dark');}}

/* ================= MAIN LOOP ================= */
let last=performance.now()/1000;
function frame(nowMs){
 const now=nowMs/1000;
 let dt=Math.min(0.05,now-last);
 updatePad(dt);last=now;
 DT=dt;
 const t=now;
 ctx.setTransform(SCALE*DPR,0,0,SCALE*DPR,0,0);
 ctx.clearRect(0,0,W,H);
 hoverUI=false;
 if(G.msgT>0)G.msgT-=dt;
 if(keys['escape']){keys['escape']=false;
  if(showControls){showControls=false;AUDIO.ui();}
  else if(G.state==='shop'){G.state=shopReturn;if(G.state==='title')initTitle();}
  else if(G.state==='splash'){if(!G.splashDone){G.splashDone=true;fadeTo(initTitle,'dark');}}
  else if(G.state==='oceans'||G.state==='boat'){saveActive();initTitle();}
  else if(G.state!=='title'&&G.state!=='drown'&&!G.lock){
   harpoon=null;saveActive();fadeTo(initTitle,'dark');}}
 switch(G.state){
  case 'splash':drawSplash();break;
  case 'title':if(!G.lock)updTitleWorld(dt,t);drawTitle(t);break;
  case 'cut':updCut(dt);drawCut(t);break;
  case 'mini':drawMini(t);break;
  case 'birdhome':drawBirdHome(t);break;
  case 'bird':updBirdGame(dt);drawBirdGame(t);break;
  case 'sledhome':drawSledHome(t);break;
  case 'sled':updSled(dt);drawSled(t);break;
  case 'birdsum':drawBirdSum(t);break;
  case 'shop':drawShop(t);break;
  case 'dive':{
   if(!G.lock){updDiver(dt,t);
    if(G.state==='dive'){
     for(const f of fishes)updFish(f,dt);
     fishes=fishes.filter(f=>!f.dead);
     for(const j of jellies)j.ph+=dt*1.6;
     updVents(dt);
     if(harpoon)updHarpoon(harpoon,dt);}}
   if(G.state==='dive'||G.state==='night'){}
   updEvents(dt);updMer(dt);updCam(dt);updParticles(dt);updFloats(dt);
   if(G.state==='dive')drawDive(t);break;}
  case 'night':if(!G.lock)updNight(dt);
   if(G.state==='night'||G.state==='summary')drawNight(t);
   if(G.state==='summary')drawSummary(t);break;
  case 'summary':drawSummary(t);break;
  case 'oceans':drawOceans(t);break;
  case 'boat':drawBoatScene(t);break;
  case 'drown':drawDive(t);drawDrown();break;}
 updFade(dt);drawFade();
 cv.style.cursor=G.state==='dive'&&!hoverUI?'crosshair':(hoverUI?'pointer':'default');
 mouse.clicked=false;
 drawPadCursor();
 requestAnimationFrame(frame);}
if(document.fonts&&document.fonts.load){
 document.fonts.load('800 40px "Baloo 2"');
 document.fonts.load('700 20px "Nunito"');}
requestAnimationFrame(frame);
</script>
