"use strict";
/* ================================================================
   TOKYUBE PRESENTS: FINN THE FISHER
   Dive by day, serve by night. An original fan prototype inspired
   by Dave the Diver. All art procedural canvas. No assets, no libs.
   ================================================================ */
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W=0,H=0,DPR=1,DT=0;
let RB=null,rctx=null;
function sizeRB(){RB=document.createElement('canvas');RB.width=Math.max(4,W>>2);RB.height=Math.max(4,H>>2);rctx=RB.getContext('2d');}
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=window.innerWidth;H=window.innerHeight;cv.width=W*DPR;cv.height=H*DPR;sizeRB();}
window.addEventListener('resize',resize);resize();

/* ---------- utils ---------- */
const TAU=Math.PI*2;
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const lerp=(a,b,t)=>a+(b-a)*t;
const rand=(a=1,b)=>b===undefined?Math.random()*a:a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));
const dist=(a,b,c,d)=>Math.hypot(c-a,d-b);
const pick=a=>a[irand(0,a.length-1)];
const easeOut=t=>1-Math.pow(1-t,3);
function rr(x,y,w,h,r){const q=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+q,y);ctx.arcTo(x+w,y,x+w,y+h,q);ctx.arcTo(x+w,y+h,x,y+h,q);ctx.arcTo(x,y+h,x,y,q);ctx.arcTo(x,y,x+w,y,q);ctx.closePath();}
function shade(c,amt){let r,g,b;
 if(c[0]==='#'){const n=parseInt(c.slice(1),16);r=n>>16;g=n>>8&255;b=n&255;}
 else{const m=c.match(/\d+/g);r=+m[0];g=+m[1];b=+m[2];}
 r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255);
 return '#'+((r<<16|g<<8|b).toString(16).padStart(6,'0'));}
const FB='"Baloo 2","Trebuchet MS",sans-serif';
const FN='"Nunito","Trebuchet MS",sans-serif';

/* ---------- audio ---------- */
const AUDIO={on:true,ctx:null,
 init(){if(!this.ctx){try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){this.on=false;}}
  if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume();},
 tone(f,d,type='sine',v=0.14,slide=0){if(!this.on||!this.ctx)return;const t=this.ctx.currentTime;
  const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;
  o.frequency.setValueAtTime(f,t);if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
  g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.connect(g).connect(this.ctx.destination);o.start(t);o.stop(t+d+0.03);},
 shoot(){this.tone(640,0.12,'square',0.07,-460);},
 hit(){this.tone(210,0.1,'square',0.11,-90);},
 caught(){this.tone(523,0.09,'sine',0.13);setTimeout(()=>this.tone(784,0.13,'sine',0.13),70);},
 bubble(){this.tone(rand(680,980),0.06,'sine',0.045,320);},
 coin(){this.tone(880,0.07,'square',0.07);setTimeout(()=>this.tone(1318,0.12,'square',0.07),60);},
 serve(){this.tone(660,0.08,'triangle',0.11);setTimeout(()=>this.tone(990,0.1,'triangle',0.09),70);},
 sad(){this.tone(300,0.2,'sawtooth',0.06,-130);},
 warn(){this.tone(392,0.12,'sine',0.09);},
 ui(){this.tone(520,0.05,'sine',0.06,220);}
};

window.addEventListener('keydown',e=>{const k=e.key.toLowerCase();keys[k]=true;
 if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});

/* ---------- immediate-mode UI ---------- */
let hoverUI=false;
function panel(x,y,w,h,a=0.66){rr(x,y,w,h,16);ctx.fillStyle=`rgba(7,15,35,${a})`;ctx.fill();
 ctx.lineWidth=1.5;ctx.strokeStyle='rgba(255,246,232,0.16)';ctx.stroke();}
function button(x,y,w,h,label,opt={}){const {size=21,accent=false,disabled=false}=opt;
 const inside=mouse.x>=x&&mouse.x<=x+w&&mouse.y>=y&&mouse.y<=y+h;
 if(inside&&!disabled)hoverUI=true;
 const lift=inside&&!disabled?-2:0;
 ctx.save();
 rr(x,y+4,w,h,14);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
 rr(x,y+lift,w,h,14);
 ctx.fillStyle=disabled?'rgba(58,68,92,0.55)':(accent?'#ff6b35':'rgba(12,26,54,0.92)');ctx.fill();
 ctx.lineWidth=2;ctx.strokeStyle=disabled?'rgba(255,255,255,0.1)':(accent?'#ffd9a8':'rgba(255,246,232,0.32)');ctx.stroke();
 ctx.fillStyle=disabled?'rgba(255,246,232,0.35)':'#fff6e8';
 ctx.font=`800 ${size}px ${FB}`;ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText(label,x+w/2,y+h/2+lift+1);
 ctx.restore();
 const hit=inside&&mouse.clicked&&!disabled;
 if(hit){mouse.clicked=false;AUDIO.ui();}
 return hit;}
function drawCoin(x,y,r){ctx.save();ctx.fillStyle='#ffcf5c';ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();
 ctx.strokeStyle='#c98f1e';ctx.lineWidth=r*0.22;ctx.beginPath();ctx.arc(x,y,r*0.68,0,TAU);ctx.stroke();
 ctx.fillStyle='#8a5e0d';ctx.font=`800 ${r*1.15}px ${FB}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',x,y+1);ctx.restore();}

/* ---------- persistent storage (artifact -> localStorage -> memory) ---------- */
const Store=(()=>{let mode='mem';const mem={};
 try{if(window.storage&&window.storage.get)mode='artifact';}catch(e){}
 if(mode==='mem'){try{localStorage.setItem('__t','1');localStorage.removeItem('__t');mode='local';}catch(e){}}
 return{mode:()=>mode,
  async get(k){try{if(mode==='artifact'){const r=await window.storage.get(k);return r?r.value:null;}
   if(mode==='local')return localStorage.getItem(k);}catch(e){}return mem[k]!==undefined?mem[k]:null;},
  async set(k,v){try{if(mode==='artifact'){await window.storage.set(k,v);return;}
   if(mode==='local'){localStorage.setItem(k,v);return;}}catch(e){}mem[k]=v;},
  async del(k){try{if(mode==='artifact'){await window.storage.delete(k);return;}
   if(mode==='local'){localStorage.removeItem(k);return;}}catch(e){}delete mem[k];}};})();
const SAVES=[null,null,null];let savesReady=false;
const slotConfirm=[0,0,0];
const slotKey=i=>'finn-fisher-save-'+i;
(async()=>{for(let i=0;i<3;i++){try{const v=await Store.get(slotKey(i));if(v)SAVES[i]=JSON.parse(v);}catch(e){}}savesReady=true;})();
function saveActive(){if(G.slot<0)return;
 const d={day:G.day,money:G.money,goalHit:G.goalHit,up:{...G.up},skins:[...G.skins],skin:G.skin,ing:{...G.ing},ts:Date.now()};
 SAVES[G.slot]=d;Store.set(slotKey(G.slot),JSON.stringify(d));}
function loadSlot(i){const d=SAVES[i];if(!d)return;G.slot=i;
 G.day=d.day||1;G.money=d.money||0;G.goalHit=!!d.goalHit;
 G.up={o2:0,bag:0,spear:0,...(d.up||{})};
 G.skins=d.skins&&d.skins.length?[...d.skins]:['default'];
 G.skin=d.skin&&SKINS[d.skin]?d.skin:'default';
 G.ing={rice:0,nori:0,wasabi:0,matcha:0,barley:0,...(d.ing||{})};}
function newSlot(i){G.slot=i;G.day=1;G.money=0;G.goalHit=false;G.up={o2:0,bag:0,spear:0};
 G.skins=['default'];G.skin='default';
 G.ing={rice:6,nori:4,wasabi:4,matcha:3,barley:2};saveActive();}
function deleteSlot(i){SAVES[i]=null;Store.del(slotKey(i));if(G.slot===i)G.slot=-1;}

 if(!s.dark)s.dark=s.b?s.b:shade(s.grad[s.grad.length-1],-45);
 SKINS[id]=s;SKINLIST.push(s);}

for(const fam of FAMS){

function drawFade(){if(G.fade<=0)return;ctx.save();ctx.globalAlpha=G.fade;
 if(G.fadeStyle==='sunset'){const g=ctx.createLinearGradient(0,0,0,H);

 else ctx.fillStyle='#060b1c';
 ctx.fillRect(0,0,W,H);ctx.restore();}

/* ---------- world generation ---------- */
let seabed=[],rocksFar=null,rocksMid=null,kelp=[],clusters=[],vents=[];
let islands=[],cloudsFar=[],cloudsNear=[],sandDots=[],pebbles=[],boulders=[],stars=[],shells=[];
let CAU=null;
const CORAL_PAL=['#ff6b6b','#ff9f5c','#f26bd0','#ffd23f','#7ce8c8','#c77dff','#ff7ab8','#66d9e8','#ffa94d','#e599f7'];
function terrainY(x){const seg=WORLD.w/(seabed.length-1);const i=clamp(Math.floor(x/seg),0,seabed.length-2);
 const t=(x-i*seg)/seg;return lerp(seabed[i].y,seabed[i+1].y,t);}
function layerRocks(par,col){const arr=[];let x=-500;
 while(x<WORLD.w+900){const w=rand(280,640),h=rand(190,540);arr.push({x,w,h});x+=w*rand(0.72,1.15);}
 return {par,col,arr};}
function makeCaustics(){CAU=document.createElement('canvas');CAU.width=CAU.height=200;
 const c=CAU.getContext('2d');c.strokeStyle='rgba(255,255,255,0.55)';
 c.shadowColor='rgba(255,255,255,0.9)';c.lineCap='round';
 for(let i=0;i<24;i++){const cx=rand(0,200),cy=rand(0,200),r=rand(20,46),n=irand(5,7);
  const pts=[];for(let k=0;k<n;k++){const a=k/n*TAU;
   pts.push({x:Math.cos(a)*r*rand(0.6,1.25),y:Math.sin(a)*r*rand(0.6,1.25)});}
  c.lineWidth=rand(2.5,6);c.shadowBlur=7;
  for(const ox of[-200,0,200])for(const oy of[-200,0,200]){c.save();c.translate(cx+ox,cy+oy);
   c.beginPath();c.moveTo((pts[0].x+pts[n-1].x)/2,(pts[0].y+pts[n-1].y)/2);
   for(let k=0;k<n;k++){const p=pts[k],q=pts[(k+1)%n];c.quadraticCurveTo(p.x,p.y,(p.x+q.x)/2,(p.y+q.y)/2);}
   c.closePath();c.stroke();c.restore();}}}
function genWorld(){
 seabed=[];const n=34;let y=WORLD.h-430;
 for(let i=0;i<=n;i++){const x=i/n*WORLD.w;y=clamp(y+rand(-150,150),WORLD.h-780,WORLD.h-170);seabed.push({x,y});}
 for(let k=0;k<2;k++)for(let i=1;i<seabed.length-1;i++)
  seabed[i].y=(seabed[i-1].y+seabed[i].y*2+seabed[i+1].y)/4;
 rocksFar=layerRocks(0.4,'#123468');rocksMid=layerRocks(0.68,'#0d2856');
 SUN.wx=WORLD.w*0.58;SUN.wy=WORLD.surface-235;
 islands=[{x:640,w:340,h:56},{x:2400,w:520,h:88},{x:3900,w:300,h:50}];
 cloudsFar=[];cloudsNear=[];
 for(let i=0;i<6;i++)cloudsFar.push({x:rand(0,WORLD.w),y:WORLD.surface-rand(320,540),s:rand(0.5,0.8),spd:rand(3,6)});
 for(let i=0;i<4;i++)cloudsNear.push({x:rand(0,WORLD.w),y:WORLD.surface-rand(160,300),s:rand(0.9,1.35),spd:rand(8,13)});
 sandDots=[];for(let i=0;i<260;i++)sandDots.push({x:rand(0,WORLD.w),d:rand(16,190),r:rand(1,2.6),tone:Math.random()<0.5});
 pebbles=[];for(let i=0;i<44;i++)pebbles.push({x:rand(0,WORLD.w),d:rand(6,60),rx:rand(5,12),ry:rand(3,7),rot:rand(-0.5,0.5),c:pick(['#6b7c94','#7d6a58','#5a6c86','#8a795f'])});
 boulders=[];for(let i=0;i<11;i++)boulders.push({x:rand(220,WORLD.w-220),rx:rand(46,118),ry:rand(30,72),c:'#4e6076'});
 stars=[];for(let i=0;i<13;i++)stars.push({x:rand(100,WORLD.w-100),r:rand(11,17),c:pick(['#ff9f5c','#f26bd0','#ffd23f','#ff6b6b']),rot:rand(TAU)});
 shells=[];for(let i=0;i<16;i++)shells.push({x:rand(100,WORLD.w-100),r:rand(7,11),rot:rand(-0.6,0.6),c:pick(['#ffd9c4','#f2c4de','#e8e0cf'])});
 kelp=[];clusters=[];vents=[];
 for(let i=1;i<seabed.length-1;i++){const px=seabed[i].x;
  if(Math.random()<0.5){const kx=px+rand(-60,60);
   kelp.push({x:kx,y:terrainY(kx)+4,h:rand(180,370),ph:rand(TAU),sway:rand(14,30),w:rand(10,16)});}
  if(Math.random()<0.55){const cx=px+rand(-70,70);const items=[];
   const m=irand(2,4);
   for(let k=0;k<m;k++)items.push({dx:rand(-78,78),type:irand(0,5),r:rand(24,54),hue:pick(CORAL_PAL),ph:rand(TAU)});
   clusters.push({x:cx,items});}
  if(Math.random()<0.22)vents.push({x:px+rand(-40,40),t:rand(1,7)});}
 if(!CAU)makeCaustics();}

/* ---------- dive entities ---------- */
let diver=null,fishes=[],jellies=[],harpoon=null,pickups=[],particles=[],floats=[];
const cam={x:0,y:0,sx:0,sy:0};
let lastWarn=0,glints=[],snow=[];
function waveOff(x,t){return Math.sin(x*0.0072+t*0.7)*9+Math.sin(x*0.018+t*1.6)*6+Math.sin(x*0.041-t*2.3)*3.5;}
function bandTop(t){return WORLD.surface+90+(WORLD.h-360-WORLD.surface)*t.band[0];}
function bandBot(t){return WORLD.surface+90+(WORLD.h-360-WORLD.surface)*t.band[1];}
function newFish(T,x,y){y=Math.min(y,terrainY(x)-60);
 const gold=Math.random()<0.05;
 return {t:T,x,y,vx:rand(-1,1)*T.sp,vy:rand(-0.3,0.3)*T.sp,hp:T.hp,ph:rand(TAU),
  flee:0,dir:rand(TAU),turn:rand(1.5,4),face:1,caught:false,dead:false,ct:0,
  gold,pal:gold?GOLDPAL:pick(T.vari),sm:rand(0.85,1.18)};}
function startDive(){
 genWorld();
 diver={x:520,y:WORLD.surface+90,vx:0,vy:0,aim:0,face:1,o2:maxO2(),kick:0,exhale:0,stun:0,inv:0};
 G.bag=[];harpoon=null;particles=[];floats=[];pickups=[];fishes=[];jellies=[];glints=[];
 cam.x=clamp(diver.x-W/2,0,Math.max(0,WORLD.w-W));cam.y=-120;
 for(const T of FISH){
  const cnt=T.count+(T.id==='tuna'?Math.min(2,G.day-1):irand(0,2));
  if(T.school){let placed=0;
   while(placed<cnt){const cx=rand(500,WORLD.w-300),cy=lerp(bandTop(T),bandBot(T),Math.random());
    const k=Math.min(cnt-placed,irand(3,5));
    for(let j=0;j<k;j++)fishes.push(newFish(T,cx+rand(-90,90),cy+rand(-50,50)));
    placed+=k;}}
  else for(let i=0;i<cnt;i++)fishes.push(newFish(T,rand(400,WORLD.w-300),lerp(bandTop(T),bandBot(T),Math.random())));}
 for(let i=0;i<6;i++){const jx=rand(760,WORLD.w-400);
  jellies.push({x:jx,y:rand(WORLD.surface+520,Math.min(WORLD.h-620,terrainY(jx)-160)),ph:rand(TAU),r:rand(24,40)});}
 G.state='dive';
 setMsg(G.day===1?'Dive!  Harpoon fish, then surface at the boat':'Day '+G.day+' — dive!',3.2);}
function addFloat(x,y,txt,c){floats.push({x,y,txt,c,t:1.5});}

function fireHarpoon(){
 if(harpoon||!diver||diver.stun>0)return;
 const a=diver.aim,gx=diver.x+Math.cos(a)*40,gy=diver.y-4+Math.sin(a)*40;
 harpoon={x:gx,y:gy,vx:Math.cos(a)*840,vy:Math.sin(a)*840,a,life:0.78,ret:false};
 AUDIO.shoot();G.shake=Math.min(6,G.shake+2);
 for(let i=0;i<5;i++)particles.push({x:gx,y:gy,vx:rand(-40,40),vy:rand(-40,40),r:rand(1.5,3),life:0.3,c:'#bfeaff',kind:'spark'});}
function updHarpoon(h,dt){
 if(!h.ret){h.x+=h.vx*dt;h.y+=h.vy*dt;h.life-=dt;
  for(const f of fishes){if(f.caught||f.dead)continue;
   if(dist(h.x,h.y,f.x,f.y)<f.t.s*f.sm+9){
    f.hp-=spearDmg();AUDIO.hit();G.shake=Math.min(9,G.shake+3);
    for(let i=0;i<8;i++)particles.push({x:h.x,y:h.y,vx:rand(-130,130),vy:rand(-130,130),r:rand(2,3.5),life:0.35,c:'#dff6ff',kind:'spark'});
    if(f.hp<=0){
     if(G.bag.length>=bagCap()){setMsg('Cooler is full — surface at the boat!',2.2);f.flee=1.5;f.dir=rand(TAU);}
     else{f.caught=true;f.ct=0;}}
    else{f.flee=1.6;f.dir=Math.atan2(f.y-h.y,f.x-h.x);addFloat(f.x,f.y-24,'Tough one!','#ffd9a8');}
    h.ret=true;break;}}
  if(h.life<=0||h.y<WORLD.surface+8||h.y>terrainY(h.x)-4||h.x<24||h.x>WORLD.w-24)h.ret=true;}
 else{const gx=diver.x+Math.cos(diver.aim)*40,gy=diver.y-4+Math.sin(diver.aim)*40;
  h.x=lerp(h.x,gx,0.3);h.y=lerp(h.y,gy,0.3);
  if(dist(h.x,h.y,gx,gy)<16)harpoon=null;}}

function bagFish(f){
 if(G.bag.length<bagCap()){
  if(f.gold){G.money+=f.t.v;addFloat(diver.x,diver.y-64,'GOLDEN! +$'+f.t.v,'#ffe27a');AUDIO.coin();
   for(let i=0;i<14;i++)particles.push({x:f.x,y:f.y,vx:rand(-120,120),vy:rand(-120,120),r:rand(2,4.4),life:rand(0.4,0.8),c:'#ffe27a',kind:'spark'});}
  G.bag.push(f.t.id);
  addFloat(diver.x,diver.y-44,f.t.n+' +1','#ffd23f');
  for(let i=0;i<10;i++)particles.push({x:f.x,y:f.y,vx:rand(-90,90),vy:rand(-90,90),r:rand(2,4),life:rand(0.3,0.6),c:'#ffe9a8',kind:'spark'});
  AUDIO.caught();G.shake=Math.min(8,G.shake+4);}
 f.dead=true;}

function updFish(f,dt){
 if(f.caught){f.x=lerp(f.x,diver.x,0.24);f.y=lerp(f.y,diver.y,0.24);f.ph+=dt*14;
  if(dist(f.x,f.y,diver.x,diver.y)<28)bagFish(f);return;}
 f.turn-=dt;
 if(f.flee<=0&&dist(f.x,f.y,diver.x,diver.y)<130){f.flee=1.1;f.dir=Math.atan2(f.y-diver.y,f.x-diver.x);}
 if(f.flee>0){f.flee-=dt;const s=f.t.sp*1.9;
  f.vx=lerp(f.vx,Math.cos(f.dir)*s,0.1);f.vy=lerp(f.vy,Math.sin(f.dir)*s,0.1);}
 else{if(f.turn<=0){f.turn=rand(1.6,4);f.dir=rand(TAU);}
  f.vx=lerp(f.vx,Math.cos(f.dir)*f.t.sp,0.02);f.vy=lerp(f.vy,Math.sin(f.dir)*f.t.sp*0.4,0.02);}
 f.x+=f.vx*dt;f.y+=f.vy*dt;
 const top=bandTop(f.t),bot=Math.min(bandBot(f.t),terrainY(f.x)-30);
 if(f.y<top){f.y=top;f.vy=Math.abs(f.vy);}
 if(f.y>bot){f.y=bot;f.vy=-Math.abs(f.vy);}
 if(f.x<70){f.x=70;f.vx=Math.abs(f.vx);}
 if(f.x>WORLD.w-70){f.x=WORLD.w-70;f.vx=-Math.abs(f.vx);}
 if(Math.abs(f.vx)>5)f.face=f.vx>0?1:-1;
 if(f.gold&&Math.random()<dt*3)particles.push({x:f.x+rand(-8,8),y:f.y+rand(-6,6),vx:rand(-14,14),vy:rand(-24,-6),r:rand(1.4,2.6),life:0.5,c:'#ffe27a',kind:'spark'});
 f.ph+=dt*(6+Math.hypot(f.vx,f.vy)*0.055);}

function o2Fail(){
 const lost=Math.ceil(G.bag.length/2);
 G.bag=G.bag.slice(0,G.bag.length-lost);
 AUDIO.sad();
 fadeTo(()=>startNight('Blacked out! The rescue buoy cost you '+lost+' fish…'),'dark');}
function screenToWorld(x,y){return {x:x+cam.sx,y:y+cam.sy};}

function updDiver(dt,t){
 const mw=screenToWorld(mouse.x,mouse.y);
 diver.aim=Math.atan2(mw.y-diver.y,mw.x-diver.x);
 diver.face=Math.cos(diver.aim)>=0?1:-1;
 let ix=0,iy=0;
 if(keys['a']||keys['arrowleft'])ix-=1;
 if(keys['d']||keys['arrowright'])ix+=1;
 if(keys['w']||keys['arrowup'])iy-=1;
 if(keys['s']||keys['arrowdown'])iy+=1;
 if(diver.stun>0){diver.stun-=dt;ix=0;iy=0;}
 const l=Math.hypot(ix,iy)||1;
 diver.vx+=ix/l*560*dt;diver.vy+=iy/l*560*dt;
 diver.vy-=8*dt;
 const drag=Math.pow(0.86,dt*60);diver.vx*=drag;diver.vy*=drag;
 diver.vx=clamp(diver.vx,-270,270);diver.vy=clamp(diver.vy,-270,270);
 diver.x=clamp(diver.x+diver.vx*dt,44,WORLD.w-44);
 diver.y+=diver.vy*dt;
 const ty=terrainY(diver.x)-26;
 if(diver.y>ty){diver.y=ty;diver.vy=Math.min(0,diver.vy);}
 const sy=WORLD.surface+waveOff(diver.x,t)+18;
 if(diver.y<sy){diver.y=sy;diver.vy=Math.max(0,diver.vy);}
 diver.kick+=dt*(4+Math.hypot(diver.vx,diver.vy)*0.05);
 const atSurf=diver.y<WORLD.surface+64;
 if(atSurf)diver.o2=Math.min(maxO2(),diver.o2+32*dt);
 else diver.o2-=3.4*dt;
 if(diver.o2<25&&!atSurf&&t-lastWarn>0.9){lastWarn=t;AUDIO.warn();}
 if(diver.o2<=0){diver.o2=0;o2Fail();return;}
 diver.exhale-=dt;
 if(diver.exhale<=0){diver.exhale=rand(0.5,1.1);
  for(let i=0;i<3;i++)particles.push({x:diver.x+diver.face*10,y:diver.y-12,vx:rand(-12,12),vy:rand(-64,-32),r:rand(2,5),life:rand(1.4,2.4),c:'rgba(222,246,255,0.85)',kind:'bubble'});
  if(Math.random()<0.35)AUDIO.bubble();}
 if(diver.inv>0)diver.inv-=dt;
 for(const j of jellies){if(diver.inv>0)break;
  const jy=j.y+Math.sin(j.ph)*14;
  if(dist(diver.x,diver.y,j.x,jy)<j.r+16){
   diver.stun=0.8;diver.inv=1.7;diver.o2=Math.max(1,diver.o2-9);
   const a=Math.atan2(diver.y-jy,diver.x-j.x);
   diver.vx=Math.cos(a)*220;diver.vy=Math.sin(a)*220;
   G.shake=10;AUDIO.sad();addFloat(diver.x,diver.y-44,'Stung! −O₂','#ff8a8a');}}
 for(const p of pickups){if(p.got)continue;
  if(dist(diver.x,diver.y,p.x,p.y)<30){p.got=true;
   diver.o2=Math.min(maxO2(),diver.o2+22);
   addFloat(p.x,p.y-22,'+O₂','#9be8ff');AUDIO.bubble();
   for(let i=0;i<8;i++)particles.push({x:p.x,y:p.y,vx:rand(-70,70),vy:rand(-70,70),r:rand(2,4),life:0.4,c:'#bfeeff',kind:'spark'});}}
 G.boatPrompt=Math.abs(diver.x-520)<120&&diver.y<WORLD.surface+100;
 if(G.boatPrompt&&(keys['e']||keys['enter'])){keys['e']=false;keys['enter']=false;
  fadeTo(()=>startNight(),'sunset');}}

   pickups.push({x:v.x,y:terrainY(v.x)-8,vy:rand(-48,-30),got:false,ph:rand(TAU)});}}
 for(const p of pickups){if(p.got)continue;
  p.ph+=dt*3;p.y+=p.vy*dt;p.x+=Math.sin(p.ph)*12*dt;

  p.x+=p.vx*dt;p.y+=p.vy*dt;}
 particles=particles.filter(p=>p.life>0);}
function updFloats(dt){for(const f of floats){f.t-=dt;f.y-=30*dt;}floats=floats.filter(f=>f.t>0);}
function updCam(dt){

const SKINS_C=['#f6c79f','#e8a878','#c98a5e','#8a5a3b','#f2d3b0'];
const HAIRC=['#2b2b33','#5a3a26','#c7742c','#8a8f9c','#3c2b52','#b8483f'];
const SHIRTS=['#e5636f','#5aa9e6','#7cc47f','#f2a541','#9a7fd1','#4fc1b0'];
let night=null;
const seatX=i=>420+i*168;
function getStage(){const s=Math.min(W/1280,H/720);
 return {s,ox:(W-1280*s)/2,oy:(H-720*s)/2};}
function stageMouse(){const st=getStage();return{x:(mouse.x-st.ox)/st.s,y:(mouse.y-st.oy)/st.s};}
function stageBtn(x,y,w,h,label,opt={}){const m=stageMouse();
 const inside=m.x>=x&&m.x<=x+w&&m.y>=y&&m.y<=y+h;
 if(inside)hoverUI=true;
 rr(x,y+3,w,h,12);ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fill();
 rr(x,y+(inside?-2:0),w,h,12);
 ctx.fillStyle=opt.accent?'#ff6b35':'rgba(12,26,54,0.92)';ctx.fill();
 ctx.lineWidth=2;ctx.strokeStyle=opt.accent?'#ffd9a8':'rgba(255,246,232,0.32)';ctx.stroke();

 ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText(label,x+w/2,y+h/2+(inside?-2:0)+1);
 const hit=inside&&mouse.clicked;if(hit){mouse.clicked=false;AUDIO.ui();}return hit;}
function startNight(note){
 const stock={};for(const id of G.bag)stock[id]=(stock[id]||0)+1;
 const total=G.bag.length;
 const custN=Math.min(8,Math.min(total+2,3+G.day+(Math.random()<0.5?1:0)));
 night={stock,resFish:{},resIng:{},resPass:{},pass:[],queue:[],chefP:0,
  customers:[],toSpawn:total===0?0:custN,spawnT:1.3,
  earn:0,tips:0,drinks:0,servedC:{},teas:0,beers:0,left:0,leftVal:0,
  done:false,doneT:0,t:0,floats:[],coins:[],empty:total===0,saved:false,pour:null,
  note:note||(G.day===1?'Chef Ume cooks the tickets — click a customer when their dish is ready':'')};
 G.bag=[];G.state='night';}
function stageFloat(x,y,txt,c){night.floats.push({x,y,txt,c,t:1.5});}
function availFish(id){return (night.stock[id]||0)-(night.resFish[id]||0);}
function availIng(k){return (G.ing[k]||0)-(night.resIng[k]||0);}
function passAvail(id){let n=0;for(const p of night.pass)if(p===id)n++;
 return n-(night.resPass[id]||0);}
function canOrder(id){if(passAvail(id)>0)return true;
 if(availFish(id)<=0)return false;
 for(const k of REC[id])if(availIng(k)<=0)return false;
 return true;}
function placeOrder(c,id){c.want=id;
 if(passAvail(id)>0){night.resPass[id]=(night.resPass[id]||0)+1;c.ready=true;}
 else{night.resFish[id]=(night.resFish[id]||0)+1;
  for(const k of REC[id])night.resIng[k]=(night.resIng[k]||0)+1;
  night.queue.push({id,c,started:false});c.ready=false;}}
function chooseOrder(){const opts=FISH.filter(f=>canOrder(f.id));
 if(!opts.length)return null;return pick(opts).id;}
function cancelOrder(c){
 const qi=night.queue.findIndex(q=>q.c===c);
 if(qi>=0){const q=night.queue[qi];
  if(!q.started){night.resFish[q.id]--;
   for(const k of REC[q.id])night.resIng[k]--;
   night.queue.splice(qi,1);}
  else q.c=null;}
 else if(c.ready&&(night.resPass[c.want]||0)>0)night.resPass[c.want]--;}
function updChef(dt){const q=night.queue[0];if(!q)return;
 if(!q.started){q.started=true;
  night.stock[q.id]--;night.resFish[q.id]--;
  for(const k of REC[q.id]){G.ing[k]--;night.resIng[k]--;}}
 night.chefP+=dt/2.6;
 if(night.chefP>=1){night.chefP=0;night.queue.shift();night.pass.push(q.id);
  AUDIO.bubble();
  if(q.c&&q.c.state==='wait')q.c.ready=true;}}
function tryServe(c){
 if(!c.ready){stageFloat(c.tx,368,'cooking…','#ffe9c4');AUDIO.ui();return;}
 const pi=night.pass.indexOf(c.want);
 if(pi<0){c.ready=false;return;}
 night.pass.splice(pi,1);
 if((night.resPass[c.want]||0)>0)night.resPass[c.want]--;
 c.state='serving';c.t=0;c.tipFrac=clamp(c.patience/22,0,1);AUDIO.serve();}
function serveComplete(c){const f=FISH[FIDX[c.want]];
 const price=f.v*2,tip=Math.max(0,Math.round(price*0.5*c.tipFrac));
 night.earn+=price;night.tips+=tip;G.money+=price+tip;
 night.servedC[c.want]=(night.servedC[c.want]||0)+1;
 stageFloat(c.tx,368,'+$'+(price+tip),'#ffd75c');
 for(let i=0;i<6;i++)night.coins.push({x:c.tx,y:452,vx:rand(-90,90),vy:rand(-260,-140),t:0.9});
 AUDIO.coin();}
function spawnCust(){
 const free=[0,1,2,3,4].filter(i=>!night.customers.some(c=>c.seat===i&&c.state!=='gone'));
 if(!free.length)return false;
 const seat=pick(free);
 night.customers.push({seat,x:1380,tx:seatX(seat),state:'enter',t:0,patience:22,dPat:10,
  want:null,ready:false,angry:false,tipFrac:0.5,kind:'tea',drinkRes:'',
  look:{skin:pick(SKINS_C),hair:irand(0,3),hcol:pick(HAIRC),shirt:pick(SHIRTS),blush:Math.random()<0.6}});
 return true;}
function openPour(c,kind){
 if(kind==='tea'){if(G.ing.matcha<=0)return;G.ing.matcha--;}
 else{if(G.ing.barley<=0)return;G.ing.barley--;}
 night.pour={c,kind,lvl:0,foam:0,holdT:0,spill:0,state:'ready',vt:0,res:'',latch:mouse.down};
 c.state='pouring';AUDIO.ui();}
function judgeTea(P){const l=P.lvl;
 P.res=l>=0.76&&l<=0.9?'PERFECT':(l>=0.64&&l<=0.98?'GOOD':'POOR');payPour(P);}
function judgeBeer(P){const b=P.lvl;
 P.res=b>=0.74&&b<=0.85?'PERFECT':(b>=0.64&&b<=0.93?'GOOD':'POOR');payPour(P);}
function payPour(P){const base=P.kind==='tea'?{PERFECT:12,GOOD:6,POOR:2}:{PERFECT:16,GOOD:8,POOR:3};
 const amt=base[P.res];G.money+=amt;night.drinks+=amt;
 if(P.kind==='tea')night.teas++;else night.beers++;
 stageFloat(P.c.tx,352,P.res+'  +$'+amt,P.res==='PERFECT'?'#7cf2a8':(P.res==='GOOD'?'#ffd75c':'#ff9d9d'));
 if(P.res==='PERFECT'){AUDIO.coin();AUDIO.serve();}
 else if(P.res==='GOOD')AUDIO.coin();else AUDIO.sad();
 P.state='judge';P.vt=0.9;}
function updPour(dt){const P=night.pour;
 if(P.state==='ready'){if(P.latch&&!mouse.down)P.latch=false;
  if(!P.latch&&mouse.down){P.state='pour';AUDIO.bubble();}}
 else if(P.state==='pour'){
  if(P.kind==='tea'){
   if(mouse.down){P.lvl+=dt*0.55;
    if(P.lvl>=1.03){P.lvl=1.03;judgeTea(P);}}
   else judgeTea(P);}
  else{
   if(mouse.down){P.holdT+=dt;
    const ff=Math.min(0.8,0.22+P.holdT*0.5);
    P.lvl+=0.5*dt*(1-ff);
    P.foam+=0.5*dt*ff*1.7;
    if(Math.random()<dt*6)AUDIO.bubble();}
   else{P.holdT=Math.max(0,P.holdT-dt*2);P.foam=Math.max(0,P.foam-dt*0.06);}
   const over=P.lvl+P.foam-1;
   if(over>0){P.foam=Math.max(0,P.foam-over);P.spill+=over;
    if(P.lvl>1){P.lvl=1;judgeBeer(P);return;}}
   if(keys['e']){keys['e']=false;judgeBeer(P);}}}
 else if(P.state==='judge'){P.vt-=dt;
  if(P.vt<=0){const c=P.c;night.pour=null;
   c.state='drink';c.t=0;c.drinkRes=P.res;}}}
function closeUpEarly(){night.toSpawn=0;
 for(const c of night.customers){
  if(c.state==='wait'){cancelOrder(c);c.state='leave';}
  else if(c.state==='drinkwait')c.state='leave';
  else if(c.state==='enter'||c.state==='sit'||c.state==='noFood')c.state='leave';}}
function updNight(dt){
 night.t+=dt;
 if(night.pour)updPour(dt);
 else if(mouse.clicked&&!night.empty){const m=stageMouse();
  for(const c of night.customers){
   if(m.x>c.x-52&&m.x<c.x+52&&m.y>380&&m.y<660){
    if(c.state==='wait'){tryServe(c);mouse.clicked=false;break;}
    if(c.state==='drinkwait'){openPour(c,c.kind);mouse.clicked=false;break;}}}}
 if(night.toSpawn>0){night.spawnT-=dt;
  if(night.spawnT<=0){if(spawnCust())night.toSpawn--;night.spawnT=rand(2.2,4.2);}}
 updChef(dt);
 for(const c of night.customers){c.t+=dt;
  if(c.state==='enter'){c.x=Math.max(c.tx,c.x-270*dt);
   if(c.x<=c.tx){c.state='sit';c.t=0;}}
  else if(c.state==='sit'){if(c.t>0.7){const w=chooseOrder();
   if(w){placeOrder(c,w);c.state='wait';c.t=0;}
   else{c.state='noFood';c.t=0;}}}
  else if(c.state==='wait'){c.patience-=dt;
   if(c.patience<=0){cancelOrder(c);
    c.state='leave';c.angry=true;night.left++;
    AUDIO.sad();stageFloat(c.tx,368,'Left hungry…','#ff9d9d');}}
  else if(c.state==='serving'){if(c.t>0.4){serveComplete(c);c.state='eat';c.t=0;}}
  else if(c.state==='eat'){if(c.t>2.4){
   const opts=[];
   if(G.ing.matcha>0)opts.push('tea');
   if(G.day>=2&&G.ing.barley>0)opts.push('beer');
   if(opts.length&&Math.random()<0.5){c.state='drinkwait';c.kind=pick(opts);c.dPat=10;c.t=0;}
   else{c.state='leave';stageFloat(c.tx,352,'♪','#ffd9a8');}}}
  else if(c.state==='drinkwait'){c.dPat-=dt;
   if(c.dPat<=0){c.state='leave';}}
  else if(c.state==='pouring'){}
  else if(c.state==='drink'){if(c.t>1.4){c.state='leave';
   stageFloat(c.tx,352,c.drinkRes==='PERFECT'?'♪ ✦':'♪','#ffd9a8');}}
  else if(c.state==='noFood'){if(c.t>2){c.state='leave';c.angry=true;night.left++;}}
  else if(c.state==='leave'){c.x+=290*dt;if(c.x>1360)c.state='gone';}}
 for(const co of night.coins){co.t-=dt;co.vy+=760*dt;co.x+=co.vx*dt;co.y+=co.vy*dt;}
 night.coins=night.coins.filter(co=>co.t>0);

 const active=night.customers.some(c=>c.state!=='gone');
 if(!night.done&&night.toSpawn===0&&!active&&night.queue.length===0&&!night.empty){night.done=true;night.doneT=0;}
 if(night.done){night.doneT+=dt;
  if(night.doneT>0.9)G.state='summary';}}

 if(!savesReady){ctx.font=`800 20px ${FB}`;ctx.fillStyle='#fff6e8';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Loading saves…',W/2,y0+64);return;}
 for(let i=0;i<3;i++){const x=x0+i*(cw+gap),s=SAVES[i];
  panel(x,y0,cw,chh,0.72);
  if(G.slot===i){rr(x,y0,cw,chh,16);
   ctx.strokeStyle='#ffd23f';ctx.lineWidth=2.5;ctx.stroke();}
  ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.font=`800 12px ${FN}`;ctx.fillStyle='rgba(255,246,232,0.5)';
  ctx.fillText('SLOT '+(i+1),x+16,y0+20);
  if(s){
   ctx.font=`800 25px ${FB}`;ctx.fillStyle='#fff6e8';ctx.fillText('Day '+s.day,x+16,y0+46);
   drawCoin(x+24,y0+76,9);
   ctx.font=`800 17px ${FB}`;ctx.fillStyle='#ffd75c';ctx.fillText('$'+s.money,x+38,y0+77);
   ctx.font=`700 11px ${FN}`;ctx.fillStyle='rgba(255,246,232,0.55)';
   ctx.fillText((s.skins?s.skins.length:1)+' suits · gear '+(((s.up&&s.up.o2)||0)+((s.up&&s.up.bag)||0)+((s.up&&s.up.spear)||0))+'/6',x+16,y0+99);
   if(button(x+13,y0+chh-40,cw-26-38,30,'Continue  ▶',{size:14,accent:true})){
    loadSlot(i);fadeTo(startDive,'dark');}
   const conf=slotConfirm[i]>0;
   if(conf){ctx.font=`700 10px ${FN}`;ctx.fillStyle='#ff9d9d';
    ctx.textAlign='center';ctx.fillText('sure?',x+cw-27,y0+chh-46);}
   if(button(x+cw-40,y0+chh-40,27,30,conf?'!':'✕',{size:13})){
    if(conf){deleteSlot(i);slotConfirm[i]=0;}
    else slotConfirm[i]=2.5;}}
  else{
   ctx.font=`800 21px ${FB}`;ctx.fillStyle='rgba(255,246,232,0.85)';
   ctx.textAlign='center';ctx.fillText('New game',x+cw/2,y0+58);
   if(button(x+cw/2-54,y0+82,108,36,'+ Start',{size:16})){
    newSlot(i);fadeTo(startDive,'dark');}
   ctx.textAlign='left';}}
 if(button(W/2-84,y0+chh+22,168,46,'⛟  Shop',{size:19})){
  if(G.slot<0){const occ=SAVES.findIndex(s2=>s2);
   if(occ>=0){loadSlot(occ);openShop('title');}
   else setMsg('Start a game first — the shop needs a wallet',2.6);}
  else openShop('title');}}
function drawTitle(t){
 drawEnv(t,false);
 ctx.save();ctx.translate(-cam.sx,-cam.sy);
 for(const f of fishes)if(!f.dead)drawFish(f,t);
 for(const j of titleJelly)drawJelly(j,t);
 drawParticlesWorld();
 const mx=cam.sx+W*0.84,my=WORLD.surface+Math.max(300,H*0.5)+Math.sin(t*1.3)*12;
 drawDiverBody(mx,my,Math.PI*0.93+Math.sin(t*0.5)*0.18,-1,t*3.6,false,G.slot>=0?curSkin():SKINS.default);
 ctx.restore();
 raysPost(t);drawSnow();drawFlare(t);drawVignette();
 drawLogo(t);drawSlots(t);
 ctx.font=`700 12px ${FN}`;ctx.fillStyle='rgba(255,246,232,0.5)';
 ctx.textAlign='center';ctx.textBaseline='middle';
 ctx.fillText('A Tokyube prototype · inspired by Dave the Diver · WASD swim · mouse harpoon',W/2,H-22);
 if(Store.mode()==='mem'){ctx.fillStyle='#ff9d9d';
  ctx.fillText('Storage unavailable — saves last this session only',W/2,H-40);}
 drawMsg();muteButton();}

/* ================= MAIN LOOP ================= */
let last=performance.now()/1000;
function frame(nowMs){
 const now=nowMs/1000;
 let dt=Math.min(0.05,now-last);last=now;
 DT=dt;
 const t=now;
 ctx.setTransform(DPR,0,0,DPR,0,0);
 ctx.clearRect(0,0,W,H);
 hoverUI=false;
 if(G.msgT>0)G.msgT-=dt;
 if(keys['escape']){keys['escape']=false;
  if(G.state==='shop'){G.state=shopReturn;if(G.state==='title')initTitle();}
  else if(G.state==='splash'){if(!G.splashDone){G.splashDone=true;fadeTo(initTitle,'dark');}}
  else if(G.state!=='title'&&!G.lock){
   harpoon=null;fadeTo(initTitle,'dark');}}
 switch(G.state){
  case 'splash':drawSplash();break;
  case 'title':if(!G.lock)updTitleWorld(dt,t);drawTitle(t);break;
  case 'shop':drawShop(t);break;
  case 'dive':{
   if(!G.lock){updDiver(dt,t);
    if(G.state==='dive'){
     for(const f of fishes)updFish(f,dt);
     fishes=fishes.filter(f=>!f.dead);
     for(const j of jellies)j.ph+=dt*1.6;
     updVents(dt);
     if(harpoon)updHarpoon(harpoon,dt);}}
   if(G.state==='dive'||G.state==='night'){}
   updCam(dt);updParticles(dt);updFloats(dt);
   if(G.state==='dive')drawDive(t);break;}
  case 'night':if(!G.lock)updNight(dt);
   if(G.state==='night'||G.state==='summary')drawNight(t);
   if(G.state==='summary')drawSummary(t);break;
  case 'summary':drawSummary(t);break;}
 updFade(dt);drawFade();
 cv.style.cursor=G.state==='dive'&&!hoverUI?'crosshair':(hoverUI?'pointer':'default');
 mouse.clicked=false;
 requestAnimationFrame(frame);}
if(document.fonts&&document.fonts.load){
 document.fonts.load('800 40px "Baloo 2"');
 document.fonts.load('700 20px "Nunito"');}
requestAnimationFrame(frame);
</script>
